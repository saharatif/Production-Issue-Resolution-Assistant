services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: mfg_user
      POSTGRES_PASSWORD: mfg_password
      POSTGRES_DB: manufacturing
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./data/plant_history/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./data/plant_history/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mfg_user -d manufacturing"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql://mfg_user:mfg_password@postgres:5432/manufacturing
      REPORT_DIR: /tmp/reports
    ports:
      - "8000:8000"
    volumes:
      - ./reports:/tmp/reports
      - ./backend/app:/app/app
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0

volumes:
  pgdata:
